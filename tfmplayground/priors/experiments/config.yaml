# Configuration for prior comparison experiments

# Data generation settings
data_generation:
  num_batches: 10000
  batch_size: 1
  max_seq_len: 450
  max_features: 100
  min_eval_pos: 10
  device: "cuda"  # cpu or cuda
  seed: 42
  max_classes_classification: 10  # for classification tasks (regression is always 0)

# Available priors to experiment with
# Note: TabPFN priors support both regression and classification
#       TICL: mlp/gp are regression-only, others are classification-only
#       TabICL: classification-only
available_priors:
  regression:
    # Real data prior
    real_only:
      lib: "real"
      prior_type: "mlp"
      sampling_mode: "only"
      description: "Real data prior (only mode, original target)"

    real_mixed:
      lib: "real"
      prior_type: "mlp"
      sampling_mode: "mixed"
      description: "Real data prior (mixed mode, any matching target column)"

    # TICL regression priors
    ticl_gp:
      lib: "ticl"
      prior_type: "gp"
      description: "TICL Gaussian Process prior"
    
    ticl_mlp:
      lib: "ticl"
      prior_type: "mlp"
      description: "TICL Multi-Layer Perceptron prior"
    
    # TabPFN priors (also support classification)
    tabpfn_mlp:
      lib: "tabpfn"
      prior_type: "mlp"
      description: "TabPFN MLP prior"
    
    tabpfn_gp:
      lib: "tabpfn"
      prior_type: "gp"
      description: "TabPFN Gaussian Process prior"
    
    tabpfn_prior_bag:
      lib: "tabpfn"
      prior_type: "prior_bag"
      description: "TabPFN Prior Bag (ensemble)"

  classification:
    # Real data prior
    real_only:
      lib: "real"
      prior_type: "mlp"
      sampling_mode: "only"
      description: "Real data prior (only mode, original target)"

    real_mixed:
      lib: "real"
      prior_type: "mlp"
      sampling_mode: "mixed"
      description: "Real data prior (mixed mode, any matching target column)"

    # TabICL (classification-only)
    tabicl_mlp_scm:
      lib: "tabicl"
      prior_type: "mlp_scm"
      description: "TabICL MLP Structural Causal Model"
    
    tabicl_tree_scm:
      lib: "tabicl"
      prior_type: "tree_scm"
      description: "TabICL Tree Structural Causal Model"
    
    tabicl_mix_scm:
      lib: "tabicl"
      prior_type: "mix_scm"
      description: "TabICL Mix SCM prior (default, ensemble of MLP and Tree)"

    # TICL classification priors
    ticl_classification_adapter:
      lib: "ticl"
      prior_type: "classification_adapter"
      description: "TICL Classification Adapter with MLP/GP base"

    ticl_boolean_conjunctions:
      lib: "ticl"
      prior_type: "boolean_conjunctions"
      description: "TICL Boolean Conjunctions prior"

    ticl_step_function:
      lib: "ticl"
      prior_type: "step_function"
      description: "TICL Step Function prior"
    
    # TabPFN priors (also support regression)
    tabpfn_mlp:
      lib: "tabpfn"
      prior_type: "mlp"
      description: "TabPFN MLP prior"
    
    tabpfn_gp:
      lib: "tabpfn"
      prior_type: "gp"
      description: "TabPFN Gaussian Process prior"
    
    tabpfn_prior_bag:
      lib: "tabpfn"
      prior_type: "prior_bag"
      description: "TabPFN Prior Bag (ensemble)"

# Real data prior settings (used when lib=real)
real_data:
  cache_dir: "tfmplayground/priors/real_data/data/cache"
  pools:
    all: "tfmplayground/priors/real_data/data/pools/train_pool_all.txt"
    classification: "tfmplayground/priors/real_data/data/pools/train_pool_classification.txt"
    regression: "tfmplayground/priors/real_data/data/pools/train_pool_regression.txt"

# Output settings
output:
  data_dir: "./results/data"
  reports_dir: "./results/reports"
  save_reports: true

# Analysis settings
analysis:
  n_samples_correlation: 100
  n_samples_mi: 100
  n_samples_complexity: 100
  n_samples_redundancy: 100
  n_samples_noise: 100
  feature_sample_size: 100

# Model Architecture
model:
  num_attention_heads: 6
  embedding_size: 192
  mlp_hidden_size: 768
  num_layers: 6

# Training Hyperparameters
training:
  epochs: 200
  batch_size: 1
  steps: 100
  lr: 0.0001
  accumulate_gradients: 1
  seed: 2402
  eval_every: 10

# Visualization Settings
visualization:
  classification_toy_samples: 200
  classification_toy_noise: 0.2
  regression_toy_samples: 100
  regression_toy_noise: 0.1